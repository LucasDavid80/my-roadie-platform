name: My Roadie Ecosystem CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # LINTS JOBS
  # ==========================================
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-web/package-lock.json'
      - run: npm ci
      - run: npm run lint
  
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - run: npm ci
      - run: npm run lint
  # ==========================================
  # TEST JOBS
  # ==========================================
  frontend-test:
    needs: frontend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-web/package-lock.json'
      - run: npm ci
      - run: npm test -- --run

  backend-test:
    needs: backend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  # ==========================================
  # E2E TESTS (Playwright)
  # ==========================================
  # frontend-e2e:
  #   needs: [frontend-build, backend-build] # Garante que os apps compilam antes de testar
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: ./frontend-web
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
