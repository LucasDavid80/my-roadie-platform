  #     - run: npx playwright install --with-deps
  #     # No CI, você precisaria subir o front e back em background ou usar o webServer do playwright.config
  #     - run: npx playwright test

      
  # ==========================================
  # BUILD JOBS
  # ==========================================
  frontend-build:
    needs: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-web/package-lock.json'
      - run: npm ci
      - run: npm run build

  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

